openapi: "3.0.3"
info:
  title: Sample API
  version: "1.0.0"
  description: A minimal OpenAPI 3.0 fixture for testing.
servers:
  - url: https://api.sample.example.com/v1
    description: production
security:
  - bearerAuth: []
paths:
  /widgets:
    get:
      operationId: listWidgets
      summary: List all widgets
      tags:
        - widgets
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Maximum number of results to return.
      responses:
        "200":
          description: A list of widgets.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Widget"
    post:
      operationId: createWidget
      summary: Create a widget
      tags:
        - widgets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WidgetCreate"
      responses:
        "201":
          description: Widget created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Widget"
        "400":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /widgets/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Widget identifier.
    delete:
      operationId: deleteWidget
      summary: Delete a widget
      tags:
        - widgets
      responses:
        "204":
          description: Widget deleted.
        "404":
          description: Widget not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Widget:
      type: object
      required:
        - id
        - color
      properties:
        id:
          type: string
          format: uuid
          description: Widget identifier.
        color:
          type: string
          enum:
            - red
            - green
            - blue
          description: Widget color.
        size:
          type: integer
          format: int32
          description: Widget size in mm.
    WidgetCreate:
      type: object
      required:
        - color
      properties:
        color:
          type: string
          enum:
            - red
            - green
            - blue
        size:
          type: integer
          format: int32
    ApiError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine-readable error code.
        message:
          type: string
          description: Human-readable message.
