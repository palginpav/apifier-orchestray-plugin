openapi: 3.0.3
# Trimmed from the public Swagger Petstore OpenAPI 3.0 spec
# (https://petstore3.swagger.io/api/v3/openapi.json), used here as a
# real-world YAML fixture for integration testing. No proprietary content.
info:
  title: Petstore API
  version: 1.0.0
  description: A trimmed Petstore OpenAPI 3.0 fixture for integration testing.
servers:
  - url: https://petstore3.swagger.io/api/v3
    description: public demo server
security:
  - api_key: []
paths:
  /pet:
    post:
      operationId: addPet
      summary: Add a new pet to the store
      tags:
        - pet
      security:
        - api_key: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    put:
      operationId: updatePet
      summary: Update an existing pet
      tags:
        - pet
      security:
        - api_key: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '404':
          description: Pet not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /pet/findByStatus:
    get:
      operationId: findPetsByStatus
      summary: Finds pets by status
      description: Multiple status values can be provided with comma-separated strings.
      tags:
        - pet
      parameters:
        - name: status
          in: query
          required: false
          description: Status values to filter by
          schema:
            type: string
            enum:
              - available
              - pending
              - sold
            default: available
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
        '400':
          description: Invalid status value
  /pet/findByTags:
    get:
      operationId: findPetsByTags
      summary: Finds pets by tags
      description: Multiple tags can be provided with comma-separated strings.
      tags:
        - pet
      parameters:
        - name: tags
          in: query
          required: false
          description: Tags to filter by
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
        '400':
          description: Invalid tag value
  /pet/{petId}:
    parameters:
      - name: petId
        in: path
        required: true
        description: ID of pet to return
        schema:
          type: integer
          format: int64
    get:
      operationId: getPetById
      summary: Find pet by ID
      description: Returns a single pet.
      tags:
        - pet
      security:
        - api_key: []
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '404':
          description: Pet not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      operationId: deletePet
      summary: Deletes a pet
      tags:
        - pet
      security:
        - api_key: []
      responses:
        '200':
          description: Pet deleted successfully
        '400':
          description: Invalid pet ID
components:
  schemas:
    Category:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
    Tag:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
    Pet:
      type: object
      required:
        - name
        - photoUrls
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: doggie
        category:
          $ref: '#/components/schemas/Category'
        photoUrls:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        status:
          type: string
          enum:
            - available
            - pending
            - sold
    ApiError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
  securitySchemes:
    api_key:
      type: apiKey
      in: header
      name: api_key
